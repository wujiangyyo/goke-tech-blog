baseURL = "https://wujiangyyo.github.io/goke-tech-blog/"
locale = "zh-cn"
title = "Goke Tech Blog"
theme = "stack"
defaultContentLanguage = "zh"
hasCJKLanguage = true

mainSections = ["posts"]

# retry counter: 1
[pagination]
  pagerSize = 10

[permalinks]
  post = "/p/:slug/"
  page = "/:slug/"

[params]
  mainSections = ["posts"]
  description = "分享AI记忆系统、知识管理、自动化运维的实践经验"
  rssFullContent = true

  [params.footer]
    since = 2026

  [params.sidebar]
    emoji = "🥜"
    subtitle = "专注AI Agent与知识管理系统的实践者"
    avatar = "/img/avatar.png"

  [params.article]
    [params.article.license]
      enabled = true
      default = "Licensed under [CC BY-NC-SA 4.0](https://creativecommons.org/licenses/by-nc-sa/4.0/)"

  [params.widgets]
    homepage = [
      { type = "search" },
      { type = "archives", params = { limit = 5 } },
      { type = "categories", params = { limit = 10 } },
      { type = "tag-cloud", params = { limit = 10 } },
    ]
    page = [{ type = "toc" }]

  [params.comments]
    enabled = false

[menu]
  [[menu.main]]
    identifier = "home"
    name = "首页"
    url = "/"
    weight = 1

  [[menu.main]]
    identifier = "posts"
    name = "📝 文章"
    url = "/posts/"
    weight = 10

  [[menu.main]]
    identifier = "archives"
    name = "📚 归档"
    url = "/archives/"
    weight = 20

  [[menu.main]]
    identifier = "tags"
    name = "🏷️ 标签"
    url = "/tags/"
    weight = 30

  [[menu.main]]
    identifier = "search"
    name = "🔍 搜索"
    url = "/search/"
    weight = 40

[[menu.social]]
  identifier = "github"
  name = "GitHub"
  url = "https://github.com/wujiangyyo"
  params = { icon = "brand-github" }

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    lineNos = true
    style = "monokai"

[outputs]
  home = ["HTML", "RSS", "JSON"]
